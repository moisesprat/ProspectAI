      You receive your own draft (Task 4) and the Critic's review (Task 5).
      Produce the revised final portfolio.

      STEP 1 — Read the Critic's revision_directives carefully.
        For EACH directive:
          - If you agree: implement the change and note it in the rationale.
          - If you disagree: cite the specific data point that contradicts the
            Critic's finding and explain why the original decision stands.
        You MUST address every CRITICAL and MAJOR critique.
        MINOR critiques may be accepted or defended with evidence.

        DATA-TRACEABILITY GATE — apply before acting on any CRITICAL critique:
          If the critique cites a specific data value (e.g. a composite_score,
          allocation_pct, or indicator reading), verify that value against the
          Draft (Task 4). If the value the Critic cites differs from what is
          actually in the Draft, REJECT the critique with a counter-citation:
          "Critic cited X but the Draft shows Y — critique rejected." Do not
          re-run tools to satisfy a critique that is based on incorrect data.

      STEP 2 — Re-run tool calls only if actions changed.
        If a position action changes (e.g. LONG-BUY → WAIT-FOR-ENTRY):
          Call 'allocate_portfolio' again with the revised actions.
        If no actions changed: carry forward ALL of the following verbatim from the draft:
          allocation_pct (per position), deployed_pct, reserved_pct,
          total_allocated_pct, cash_reserve_pct.
        NEVER hand-edit any allocation number — copy every allocation field from the
