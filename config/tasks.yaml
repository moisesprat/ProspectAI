# ProspectAI Task Configuration
# Primary place to change task behavior (instructions, output schema, expected_output).
# Use $sector and $today as template variables — they are substituted at runtime.
# Context wiring (which prior tasks each task receives) is defined in prospect_ai_crew.py.

tasks:

  # ─────────────────────────────────────────────────────────────────────────────
  # Task 1: Market Sentiment Analysis
  # Agent:   Market Analyst
  # Context: none (first in pipeline)
  # Tools:   analyze_sector_reddit_sentiment, search_internet (Serper fallback)
  # Output:  {sector, data_source, candidate_stocks[5], summary}
  # ─────────────────────────────────────────────────────────────────────────────
  market_analysis:
    description: |
      Identify the top 5 most-discussed stocks in the $sector sector from Reddit retail
      investor communities and produce a structured sentiment report.

      STEP 1 — Call the Reddit tool:
        Call the tool named 'analyze_sector_reddit_sentiment' with sector="$sector".
        It returns a dict with 'candidate_stocks' (list) and 'fallback_required' (bool).

      STEP 2 — Handle fallback if needed:
        If fallback_required is True, use 'search_internet' (SerperDevTool) with query:
          "$sector sector stocks investors discussing $today"
        Extract up to 5 stock tickers from the search snippets. For each ticker, set:
          mention_count = 0, relevance_score = 0.5
          average_sentiment: assign a float in [-1.0, +1.0] based on the actual tone
            of the snippets for that ticker. Use the full range — do NOT default to 0.65.
            Examples: strongly bullish coverage → 0.75-0.85, mildly positive → 0.40-0.55,
            neutral/mixed → 0.10-0.30, mildly negative → -0.10 to -0.30,
            bearish/risk-focused → -0.40 to -0.70.
            Each ticker must get a DIFFERENT score reflecting its specific news tone.
        Set data_source to "serper_fallback".

      STEP 3 — Write a rationale (80-120 words) for each stock covering:
        a) Key themes retail investors are discussing and the sentiment tone
        b) Specific catalysts, concerns, or red flags visible in the data
        c) Relevant macro/geopolitical context influencing sentiment as of $today
        Base rationale on 'sample_posts' from the tool output (or search snippets for fallback).

      STEP 4 — Output a pure Python dict (no markdown wrapper) using actual tickers from STEP 1/2:
        sector: str — "$sector"
        data_source: str — "reddit" or "serper_fallback"
        analysis_timestamp: str — current UTC datetime in ISO 8601 format
        candidate_stocks[]: ticker(str) mention_count(int) average_sentiment(float)
                            relevance_score(float) rationale(str 80-120 words)
        summary: str — 2-3 paragraph overview of sector sentiment, min 150 words

      RULES:
      - Output exactly 5 stocks (fewer only if truly fewer were found).
      - Do NOT invent tickers. Use only tickers returned by the tool or found in search results.
      - All numeric values must be numbers, not strings.
      - The 'summary' must be at least 150 words.
      - 'analysis_timestamp' must be a string in ISO 8601 format — never omit it.
    expected_output: >
      Python dict with sector='$sector', data_source, analysis_timestamp (ISO 8601 string),
      candidate_stocks (list of 5 dicts: ticker, mention_count,
      average_sentiment, relevance_score, rationale), and summary string.

  # ─────────────────────────────────────────────────────────────────────────────
  # Task 2: Technical Analysis
  # Agent:   Technical Analyst
  # Context: market_analysis_task
  # Tools:   calculate_technical_indicators (TechnicalAnalysisTool)
  # Output:  {sector, analysis_date, stock_analyses[n], sector_technical_summary}
  # ─────────────────────────────────────────────────────────────────────────────
  technical_analysis:
    description: |
      Run technical analysis on every ticker from the Market Analyst's candidate_stocks
      list and produce a structured report.

      STEP 1 — Extract tickers:
        Read the context. Find the 'candidate_stocks' list. Extract each 'ticker' value.
        You will typically get 5 tickers.

      STEP 2 — Fetch ALL technical data in one call:
        Call 'calculate_technical_indicators' ONCE with the full ticker array from STEP 1.
        Example: calculate_technical_indicators(tickers_json='["AAPL","NVDA","MSFT"]')
        The tool loops internally over all tickers. Do NOT call it per ticker.
        The tool returns {"technical_analysis": [one entry per ticker]}.
        Entries that contain an 'error' key indicate a failed ticker — record the error
        and skip that ticker in STEP 3.

      STEP 3 — For each ticker entry in the technical_analysis array from STEP 2:
        Skip entries that contain an 'error' key.
        Each successful entry already contains an 'interpretation' sub-dict with
        pre-computed numeric values: entry_zone_low, entry_zone_high, entry_zone_status,
        momentum_score, risk_level, and regime. Copy these numbers verbatim — do NOT
        recalculate or modify them.

        Then use your own reasoning to produce:
        - overall_signal: your assessment of "BULLISH", "BEARISH", "MIXED", or "NEUTRAL"
          based on MACD status, MA status, RSI level, and other raw indicators.
        - key_signals: 3-5 plain-English strings describing the most notable readings

        Examples: "RSI at 63 — neutral momentum", "MACD bullish crossover",
          "Stochastic at 94 — extreme overbought", "SMA20 > SMA50 > SMA200"

      STEP 4 — Output a pure Python dict (no markdown wrapper):
        sector: str
        analysis_date: str — "$today"
        stock_analyses[]: ticker(str) current_price(float|null) period_analyzed(str)
          raw_indicators: rsi(float) macd_status(str) ma_status(str) bb_status(str)
                          adx(float) atr(float) sma_20(float) ema_12(float)
          interpretation: overall_signal(str) key_signals(str[]) entry_zone_low(float)
                          entry_zone_high(float) momentum_score(float) risk_level(str)
                          regime(str) entry_zone_status(str)
          error: str|null
        sector_technical_summary: str

      RULES:
      - raw_indicators must use actual numbers from the tool — never invented values.
      - entry_zone_low, entry_zone_high, momentum_score, risk_level must be copied
        verbatim from the 'interpretation' sub-dict in the batch tool result.
      - overall_signal and key_signals are YOUR reasoned assessment of the raw data.
      - If the tool returns an error for a ticker, set error to that string and all other
        fields (current_price, raw_indicators, interpretation) to null.
      - If current_price cannot be retrieved (tool error or zero value), set current_price
        to null and populate price_data_error with a short description of the failure
        (e.g. "yfinance returned no price data for TICKER"). The Investment Strategist
        will use this field to decide how to handle the position.
      - Do not skip any ticker from the market analyst output.
    expected_output: >
      Python dict with sector='$sector', analysis_date,
      stock_analyses (one entry per ticker with raw_indicators and
      interpretation), and sector_technical_summary string.

  # ─────────────────────────────────────────────────────────────────────────────
  # Task 3: Fundamental Analysis
  # Agent:   Fundamental Analyst
  # Context: market_analysis_task, technical_analysis_task
  # Tools:   fetch_fundamental_data (FundamentalDataTool)
  # Output:  {sector, analysis_date, stock_analyses[n], sector_fundamental_summary}
  # ─────────────────────────────────────────────────────────────────────────────
  fundamental_analysis:
    description: |
      Fetch real financial data for each stock and produce a structured fundamental report.
      You receive context from Market Analyst (sentiment) and Technical Analyst (indicators).

      MANDATORY: You MUST make exactly TWO tool calls — one batch fetch, one batch grade.
      The tools loop internally over all tickers. Do NOT call them per ticker.
      Do NOT use training data, memory, or prior knowledge to fill in financial numbers.

      STEP 1 — Extract tickers:
        Read the technical analysis context. Find 'stock_analyses'. Extract ALL tickers
        into a JSON array, e.g. ["AAPL","NVDA","MSFT","GOOGL","AMZN"].

      STEP 2 — Fetch ALL fundamentals in one call:
        Call 'fetch_fundamental_data' ONCE with the full ticker array from STEP 1.
        Example: fetch_fundamental_data(tickers_json='["AAPL","NVDA","MSFT"]')
        The tool returns {"fundamentals": [one entry per ticker]}.
        Save the complete output string — you will pass it to the next tool.

      STEP 3 — Grade ALL fundamentals in one call:
        Pass the ENTIRE output string from STEP 2 directly to 'grade_fundamental_data'.
        Example: grade_fundamental_data(fundamentals_batch_json='<exact string from STEP 2>')
        The tool returns {"grades": [one entry per ticker]} with valuation_grade,
        financial_health, growth_outlook, and fundamental_component for each ticker.
        Tickers where fetch failed will have fundamental_unknown=true and all grades="UNKNOWN".
        Copy all returned values verbatim — do NOT substitute or invent any grade.
        Write risk_factors, catalysts, and fundamental_summary yourself,
        citing specific numbers from the raw data.
        When fundamental_unknown=true: set risk_factors=["Fundamental data unavailable"],
        catalysts=["Data unavailable"], fundamental_summary="No fundamental data
        available for this ticker."

      STEP 4 — Output a pure Python dict (no markdown wrapper):
        sector: str
        analysis_date: str — "$today"
        stock_analyses[]: ticker(str) error(str|null)
          raw_fundamentals: pe_ratio(float|null) forward_pe(float|null) pb_ratio(float|null)
            ps_ratio(float|null) ev_ebitda(float|null) market_cap(float|null)
            revenue_growth_yoy(float|null) net_margin(float|null) gross_margin(float|null)
            return_on_equity(float|null) debt_to_equity(float|null) current_ratio(float|null)
            free_cash_flow(float|null) dividend_yield(float|null)
          assessment: valuation_grade(str) financial_health(str) growth_outlook(str)
            fundamental_component(int|null) fundamental_unknown(bool)
            fundamental_summary(str) risk_factors(str[]) catalysts(str[])
        sector_fundamental_summary: str

      RULES:
      - raw_fundamentals must contain ONLY values from 'fetch_fundamental_data'. No invented numbers.
      - valuation_grade, financial_health, growth_outlook, fundamental_component must be copied
        verbatim from the 'grade_fundamental_data' tool result.
      - When fundamental_unknown=true, do NOT substitute any grade or score — copy the UNKNOWN
        values verbatim. Downstream agents are designed to handle UNKNOWN without fabricating.
      - Include all tickers from technical analysis context.
    expected_output: >
      Python dict with sector='$sector', analysis_date,
      stock_analyses (one entry per ticker with raw_fundamentals and
      assessment), and sector_fundamental_summary string.

  # ─────────────────────────────────────────────────────────────────────────────
  # Task 4: Draft Strategy
  # Agent:   Investor Strategic
  # Context: market_analysis_task, technical_analysis_task, fundamental_analysis_task
  # Tools:   compute_composite_scores, allocate_portfolio
  # Output:  InvestorStrategicOutput (DRAFT — will be reviewed by Critic)
  # ─────────────────────────────────────────────────────────────────────────────
  draft_strategy:
    description: |
      Synthesize the outputs from the Market, Technical, and Fundamental agents
      and produce a machine-readable JSON portfolio draft.

      STEP 1 — Cross-reference data for each ticker:
        From Market context:      average_sentiment (float), rationale
        From Technical context:   momentum_score, entry_zone_low, entry_zone_high,
                                  entry_zone_status, regime, risk_level,
                                  overall_signal, key_signals, raw_indicators
        From Fundamental context: financial_health, growth_outlook, valuation_grade,
                                  fundamental_component, risk_factors, catalysts

        CRITICAL: average_sentiment is a float between -1.0 and 1.0. Extract the EXACT
        value — do NOT use 0.65 or any default.
        CRITICAL: momentum_score is a float between 0 and 10. Extract the EXACT
        value — do NOT default to 8.0 or any other fixed number.
        CRITICAL: Every stock must have a DISTINCT composite_score.
        CRITICAL: When a stock has fundamental_unknown=true, pass financial_health="UNKNOWN"
        and growth_outlook="UNKNOWN" to compute_composite_scores. The tool will exclude
        the fundamental component from that stock's score and flag fundamental_unknown=true.
        Copy the returned composite_score verbatim — it already reflects missing data.
        CRITICAL: If a stock has price_data_error set (current_price is null), it means
        live price data could not be retrieved. You MUST cap that stock at MONITOR or AVOID —
        do NOT assign LONG-BUY, SCALED-ENTRY, or WAIT-FOR-ENTRY. Include the price_data_error
        message in the rationale so the user understands why no trade was initiated.

      STEP 2 — Call 'compute_composite_scores' ONCE with ALL stocks:
          compute_composite_scores(stocks_json='[
            {
              "ticker":            "<TICKER>",
              "average_sentiment": <float>,
              "momentum_score":    <float from Technical interpretation>,
              "financial_health":  "<STRONG|ADEQUATE|WEAK|UNKNOWN>",
              "growth_outlook":    "<HIGH|MODERATE|LOW|DECLINING|UNKNOWN>"
            }, ...
          ]')
        Record each stock's composite_score and components verbatim.
        For tickers with fundamental_unknown=true the tool returns fundamental_component=null —
        copy it as null, do NOT substitute a number.

      STEP 3 — Decide one action per stock (check rules in order):
        price_data_error set (current_price=null) → MONITOR or AVOID only.
        fundamental_unknown=true → MONITOR or WAIT-FOR-ENTRY only.
        price WITHIN zone (entry_zone_low ≤ price ≤ entry_zone_high):
          default → LONG-BUY; use SCALED-ENTRY if VERY_EXPENSIVE or WEAK health.
          WAIT-FOR-ENTRY is invalid when price is already inside the zone.
        price ABOVE zone:
          RSI > 70 or Stochastic > 80 → WAIT-FOR-ENTRY
          gap ≥ 5% above entry_zone_high → WAIT-FOR-ENTRY
          gap < 5% + regime=TRENDING + composite ≥ 75 + Stochastic < 88 → SCALED-ENTRY
          otherwise → LONG-BUY (allocator uses zone-anchored setup)
        financial_health = WEAK → MONITOR or AVOID
        composite < 55 + no clear catalyst → MONITOR
        poor fundamentals + negative sentiment → AVOID
        Valid actions only: LONG-BUY, SCALED-ENTRY, WAIT-FOR-ENTRY, MONITOR, AVOID.
        HOLD and SHORT-SELL are invalid — they cause schema rejection.
        MONITOR ≠ AVOID: MONITOR signals interest but conditions not met yet.

      STEP 4 — Call 'allocate_portfolio' ONCE with your decided actions:
          allocate_portfolio(stocks_json='[
            {
              "ticker":          "<TICKER>",
              "action":          "<YOUR DECIDED ACTION>",
              "composite_score": <float from Step 2>,
              "entry_zone_low":  <float from Technical context>,
              "entry_zone_high": <float from Technical context>,
              "current_price":   <float — current market price; required for SCALED-ENTRY>
            }, ...
          ]')
        Copy ALL of the following verbatim from the tool result:
          allocation_pct, trade_setup, scaled_entry_setups,
          deployed_pct, reserved_pct, total_allocated_pct, cash_reserve_pct.
        Also copy composite_score verbatim from Step 2 into each position —
        do NOT paraphrase or cite a different value in the rationale text.
        Allocation caps: LONG-BUY 40% / SCALED-ENTRY 20% / WAIT-FOR-ENTRY 15%.
        WAIT-FOR-ENTRY: receives trade_setup AND a real allocation_pct (earmarked capital).
        SCALED-ENTRY: receives scaled_entry_setups (list of 2 setups) and trade_setup=null.
          scaled_entry_setups[0] = immediate tranche (R/R 2:1 from current_price)
          scaled_entry_setups[1] = pullback tranche (zone-anchored)
        MONITOR / AVOID: allocation_pct=0, trade_setup=null, scaled_entry_setups=null.
        The tool returns deployed_pct, reserved_pct, cash_reserve_pct as three separate
        fields. Copy all three into your output.

      STEP 5 — Write qualitative content for each position:
        rationale: 100-150 words citing specific numbers from all three agents.
          Every claim must reference a data point (e.g. "RSI=67", "momentum_score=7.8").
        monitoring_triggers: 2-3 specific, measurable thresholds directionally
          consistent with your action. LONG-BUY triggers must fire on bearish
          reversal patterns, not normal uptrend levels.
          For WAIT-FOR-ENTRY: current_price is ABOVE entry_zone_high — you are waiting
          for price to move DOWN into the zone. At least one trigger must describe price
          falling to the zone (e.g. "Price falls/retraces to entry_zone_high of $$X.XX").
          Never write a trigger that describes price moving up toward zone_high — that
          is the wrong direction. Also include an RSI or MACD condition that confirms
          the pullback is a healthy retracement, not a breakdown.
          For SCALED-ENTRY: at least one trigger must reference the pullback zone
          (e.g. "Price retraces to pullback zone low of $$X.XX").
          For MONITOR: triggers must describe conditions that would upgrade to WAIT-FOR-ENTRY
          or LONG-BUY (e.g. "RSI drops below 55", "Earnings beat clears valuation concern").
        review_frequency: DAILY / WEEKLY / MONTHLY.

      STEP 6 — Determine portfolio risk_level: Low / Medium / High / Very High.

      STEP 7 — Output a pure JSON dict (no markdown fences):
        sector: str
        positions[]: ticker(str) action(str) composite_score(float) allocation_pct(float)
          current_price(float|null) trade_setup(obj|null) scaled_entry_setups(list|null)
          rationale(str 100-150 words) monitoring_triggers(str[]) review_frequency(str)
        deployed_pct: float
        reserved_pct: float
        total_allocated_pct: float
        cash_reserve_pct: float
        overall_strategy: str (2-3 paragraphs, describe allocation logic accurately)
        risk_level: str — Low/Medium/High/Very High
    expected_output: >
      JSON dict with sector='$sector', positions
      (ticker/action/allocation_pct/current_price/trade_setup/scaled_entry_setups/
      rationale/monitoring_triggers/review_frequency), deployed_pct, reserved_pct,
      total_allocated_pct, cash_reserve_pct, overall_strategy, and risk_level.
      This is a DRAFT pending Critic review.

  # ─────────────────────────────────────────────────────────────────────────────
  # Task 5: Critique Review
  # Agent:   Critic
  # Context: market + technical + fundamental + draft_strategy
  # Tools:   none (pure adversarial analysis)
  # Output:  CriticOutput
  # ─────────────────────────────────────────────────────────────────────────────
  critique_review:
    description: |
      You receive the Draft Portfolio and a compact reference table with key
      verification data for each ticker. Challenge every position and find every flaw.

      STEP 1 — For EACH ticker in the draft, build your data picture:
        From the reference_table: locate the row where "ticker" matches. Available fields:
          rsi, stochastic_status, macd_status, entry_zone_status, momentum_score,
          average_sentiment, valuation_grade, financial_health.
        From Draft: action, allocation_pct, composite_score, current_price,
          rationale, monitoring_triggers,
          trade_setup (entry_zone_low, entry_zone_high, stop_loss, take_profit).

      STEP 2 — Apply the adversarial checklist to EACH ticker.
        You MUST find at least one issue per position.
        Flag every violation using these issue types:

        PRICE_IN_ZONE_WAIT      — WAIT-FOR-ENTRY when entry_zone_low ≤ current_price ≤ entry_zone_high (CRITICAL)
        OVERBOUGHT_IGNORED      — RSI > 70 or Stochastic > 80 with LONG-BUY, no overbought acknowledgment (MAJOR)
        ENTRY_ZONE_VIOLATED     — LONG-BUY with PULLBACK_ENTRY status and gap ≥ 5% (MAJOR)
        FABRICATED_SIGNAL       — "strong momentum" with momentum_score < 6, or "bullish" with Bearish/Mixed MACD (MAJOR)
        ALLOCATION_MISMATCH     — allocation rank does not match composite_score rank (MAJOR)
        SENTIMENT_CONTRADICTION — average_sentiment < 0.0 with LONG-BUY, no negative caveat (MAJOR)
        VALUATION_IGNORED       — valuation_grade=VERY_EXPENSIVE with LONG-BUY, no valuation risk mentioned (MAJOR)
        TRIGGER_CONTRADICTION   — LONG-BUY trigger fires during normal uptrend (MINOR)
        CONCENTRATION_BREACH    — allocation_pct > 40.0 for any position (CRITICAL)
        WEAK_FUNDAMENTALS_BUY   — financial_health=WEAK with LONG-BUY, no balance-sheet risk acknowledged (MAJOR)
        MISSING_STOP_LOGIC      — stop_loss set at or above entry_zone_high (MAJOR)
        VAGUE_RATIONALE         — claims without citing specific numbers (MINOR)
        MISSING_SCALED_SETUPS   — SCALED-ENTRY with scaled_entry_setups=null or fewer than 2 setups (CRITICAL)
        WAIT_ENTRY_ZERO_ALLOC   — WAIT-FOR-ENTRY with allocation_pct=0 (CRITICAL)
        MONITOR_WITH_SETUP      — MONITOR with trade_setup or scaled_entry_setups populated (CRITICAL)
        AVOID_WITH_SETUP        — AVOID with trade_setup or scaled_entry_setups populated (CRITICAL)
        INVALID_ACTION          — action not in {LONG-BUY, SCALED-ENTRY, WAIT-FOR-ENTRY, MONITOR, AVOID} (CRITICAL)
        IMMEDIATE_RR_BELOW_1_5  — SCALED-ENTRY immediate tranche R/R < 1.5 from current_price (CRITICAL)
        BUCKET_SUM_ERROR        — deployed_pct + reserved_pct + cash_reserve_pct ≠ 100 (±0.5%) (CRITICAL)
        COMPOSITE_SCORE_MISMATCH— |position.composite_score − tool_value| > 1.0 (CRITICAL)

        For each finding, state the exact data value that creates the contradiction and what the draft says.

      STEP 3 — Portfolio-level review:
        - Does deployed_pct + reserved_pct + cash_reserve_pct = 100 (±0.5%)?
        - Does any position exceed 40% allocation?
        - Are there at least 3 distinct composite_scores?
        - Does each position's composite_score field match the value from the
          compute_composite_scores tool output (do NOT recalculate — compare directly)?
        - Do all monitoring triggers reference specific measurable thresholds?
        - Is the overall_strategy internally consistent with the individual actions?
        - Does overall_strategy accurately describe allocation logic (not falsely claiming
          strict rank-proportionality when positions are capped at equal levels)?

      STEP 4 — Write revision_directives as exact instructions:
        Format: "[TICKER]: [specific change required] because [exact data contradiction]"
        Example: "NVDA: Change action from LONG-BUY to WAIT-FOR-ENTRY because RSI=78
                  and Stochastic=82 indicate overbought conditions — neither value
                  appears in the rationale nor triggers."
        Every CRITICAL and MAJOR issue must have a corresponding directive.

      STEP 5 — Output a pure Python dict (no markdown):
        sector: str
        draft_assessment: str — one paragraph summarizing key weaknesses (no praise)
        per_ticker_critiques[]: ticker(str) severity(str) issue_type(str) finding(str) instruction(str)
        portfolio_level_issues: str[] — bucket math, cap violations, score duplicates
        revision_directives: str[] — "[TICKER]: [change] because [exact data]"
        approved_positions: str[] — tickers fully compliant (may be empty)

      RULES:
      - For each ticker, check all failure-mode criteria. If a position is fully
        compliant, record it in approved_positions and explain why — that is a valid
        and useful finding. Do not invent minor issues to fill a quota.
      - Severity CRITICAL = requires mandatory action change or allocation change.
      - Severity MAJOR = requires rationale or trigger correction.
      - Severity MINOR = recommendation to improve clarity or precision.
      - approved_positions lists tickers where the draft is FULLY correct (can be empty).
      - Never soften a finding with "however" or "overall reasonable". Report the flaw.
    expected_output: >
      Python dict with sector='$sector', draft_assessment, per_ticker_critiques
      (list with ticker/severity/issue_type/finding/instruction), portfolio_level_issues,
      revision_directives, and approved_positions.

  # ─────────────────────────────────────────────────────────────────────────────
  # Task 6: Final Strategy
  # Agent:   Investor Strategic (revision pass)
  # Context: draft_strategy + critique_review
  # Tools:   allocate_portfolio (used only when actions change)
  # Output:  InvestorStrategicOutput (FINAL — post-critic revision)
  # ─────────────────────────────────────────────────────────────────────────────
  final_strategy:
    description: |
      Receive the draft (Task 4) and the Critic's review (Task 5).
      Produce the revised final portfolio by applying the Critic's directives.

      STEP 1 — Read the Critic's revision_directives carefully.
        For EACH directive:
          - If you agree: implement the change and note it in the rationale.
          - If you disagree: cite the specific data point from the Draft that
            contradicts the Critic's finding and explain why the original stands.
        You MUST address every CRITICAL and MAJOR critique.
        MINOR critiques may be accepted or defended with evidence.

      STEP 2 — Determine whether any action changed from the draft.

        CASE A — No action changed:
          Copy all position and portfolio numeric fields verbatim from the draft.
          Do NOT recalculate any numeric field.

        CASE B — One or more actions changed:
          Call allocate_portfolio ONCE with all positions using revised actions
          (pass ticker, action, composite_score, entry zones, current_price — all verbatim from draft).
          Copy allocation_pct, trade_setup, scaled_entry_setups from tool result.
          Copy deployed_pct, reserved_pct, cash_reserve_pct, total_allocated_pct from tool result.
          composite_score and current_price: always from draft, never from tool.

        In both cases: total_allocated_pct MUST equal the sum of all positions'
          allocation_pct. NEVER compute deployed_pct, reserved_pct, or
          cash_reserve_pct by hand — they must come from the draft or the tool.

      STEP 3 — Write revised qualitative content.
        rationale: 100-150 words per position. If a critique was addressed, state
          what changed and why. If rejected, cite the specific number that supports
          the original decision.
        monitoring_triggers: directionally consistent with the action.
        review_frequency: DAILY / WEEKLY / MONTHLY.
        overall_strategy: 2-3 paragraphs summarising the final portfolio.

      STEP 4 — Output a pure JSON dict (no markdown fences):
        sector: str
        positions[]: ticker(str) action(str) composite_score(float) allocation_pct(float)
          current_price(float|null) trade_setup(obj|null) scaled_entry_setups(list|null)
          rationale(str 100-150 words) monitoring_triggers(str[]) review_frequency(str)
        deployed_pct: float
        reserved_pct: float
        total_allocated_pct: float
        cash_reserve_pct: float
        overall_strategy: str (2-3 paragraphs)
        risk_level: str — Low/Medium/High/Very High

      RULES:
      - Output only the JSON dict — no text before or after, no markdown fences.
      - All CRITICAL critique issues must be addressed (changed or defended).
      - All numeric fields (composite_score, allocation_pct, entry zones, stops) must
        be copied verbatim from the draft — never recalculated or invented.
      - Valid actions: LONG-BUY, SCALED-ENTRY, WAIT-FOR-ENTRY, MONITOR, AVOID.
        HOLD and SHORT-SELL are not valid actions.
      - risk_level: Low / Medium / High / Very High.
      - review_frequency: DAILY / WEEKLY / MONTHLY.
      - Maximum single-position size: 40%.
    expected_output: >
      JSON dict with sector='$sector', positions
      (ticker/action/allocation_pct/current_price/trade_setup/scaled_entry_setups/
      rationale/monitoring_triggers/review_frequency), deployed_pct, reserved_pct,
