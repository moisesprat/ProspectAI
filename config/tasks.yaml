# ProspectAI Task Configuration
# Primary place to change task behavior (instructions, output schema, expected_output).
# Use $sector and $today as template variables — they are substituted at runtime.
# Context wiring (which prior tasks each task receives) is defined in prospect_ai_crew.py.

tasks:

  # ─────────────────────────────────────────────────────────────────────────────
  # Task 1: Market Sentiment Analysis
  # Agent:   Market Analyst
  # Context: none (first in pipeline)
  # Tools:   analyze_sector_reddit_sentiment, search_internet (Serper fallback)
  # Output:  {sector, data_source, candidate_stocks[5], summary}
  # ─────────────────────────────────────────────────────────────────────────────
  market_analysis:
    description: |
      You are the first agent in the ProspectAI pipeline.
      Identify the top 5 most-discussed stocks in the $sector sector from Reddit retail
      investor communities and produce a structured sentiment report.

      STEP 1 — Call the Reddit tool:
        Call the tool named 'analyze_sector_reddit_sentiment' with sector="$sector".
        It returns a dict with 'candidate_stocks' (list) and 'fallback_required' (bool).

      STEP 2 — Handle fallback if needed:
        If fallback_required is True, use 'search_internet' (SerperDevTool) with query:
          "$sector sector stocks investors discussing $today"
        Extract up to 5 stock tickers from the search snippets. Assign:
          mention_count = 0, relevance_score = 0.5
          average_sentiment: positive news = 0.65, mixed = 0.40, negative = 0.15
        Set data_source to "serper_fallback".

      STEP 3 — Write LLM rationales (200-400 words each):
        For each stock, write a 'rationale' covering:
        a) Key themes retail investors are discussing right now
        b) Sentiment tone (bullish / bearish / mixed) and the specific reasons
        c) Catalysts or concerns mentioned (products, earnings, regulation, competition)
        d) Red flags or risks visible in community sentiment
        e) How current macroeconomic conditions, geopolitical events, or sector trends
           are influencing investor sentiment at this moment in time
        Today's date is $today. All analysis must reflect the current market environment.
        For Reddit data: base rationale on the 'sample_posts' field from the tool output.
        For Serper fallback: base rationale on the search result snippets.

      STEP 4 — Output EXACTLY this structure (pure Python dict, no markdown wrapper).
      Use the actual tickers identified in STEP 1 or STEP 2 — do NOT substitute example tickers:
      {
        "sector": "$sector",
        "data_source": "reddit",
        "candidate_stocks": [
          {
            "ticker": "<TICKER_FROM_STEP_1_OR_2>",
            "mention_count": <integer>,
            "average_sentiment": <float>,
            "relevance_score": <float>,
            "rationale": "<200-400 words>"
          }
        ],
        "summary": "<2-3 paragraph overview of overall sector sentiment as of $today, key themes, current macro/geopolitical context, and notable patterns — minimum 150 words>"
      }

      RULES:
      - Output exactly 5 stocks (fewer only if truly fewer were found).
      - Do NOT invent tickers. Use only tickers returned by the tool or found in search results.
      - All numeric values must be numbers, not strings.
      - The 'summary' must be at least 150 words.
    expected_output: >
      Python dict with sector='$sector', data_source,
      candidate_stocks (list of 5 dicts: ticker, mention_count,
      average_sentiment, relevance_score, rationale), and summary string.

  # ─────────────────────────────────────────────────────────────────────────────
  # Task 2: Technical Analysis
  # Agent:   Technical Analyst
  # Context: market_analysis_task
  # Tools:   calculate_technical_indicators (TechnicalAnalysisTool)
  # Output:  {sector, analysis_date, stock_analyses[n], sector_technical_summary}
  # ─────────────────────────────────────────────────────────────────────────────
  technical_analysis:
    description: |
      You are the Technical Analyst in the ProspectAI pipeline.
      You receive the Market Analyst output as context. Run technical analysis on every
      ticker in the candidate_stocks list and produce a structured report.

      STEP 1 — Extract tickers:
        Read the context. Find the 'candidate_stocks' list. Extract each 'ticker' value.
        You will typically get 5 tickers.

      STEP 2 — Call the tool for EACH ticker:
        Call 'calculate_technical_indicators' with ticker="<TICKER>" and period="1y".
        Collect all results before writing your output. If a ticker returns an 'error'
        key, record the error and continue to the next ticker.

      STEP 3 — For each ticker, call 'interpret_technical_indicators':
        Build a JSON string from the raw values returned in STEP 2 and call:
          interpret_technical_indicators(
            ticker="<TICKER>",
            raw_indicators_json='{"current_price":<val>,"sma_20":<val>,"atr":<val>,
              "rsi":<val>,"macd_status":"<val>","ma_status":"<val>",
              "bb_status":"<val>","adx":<val>}'
          )
        Record the returned entry_zone_low, entry_zone_high, momentum_score,
        risk_level, and overall_signal verbatim — do NOT recalculate them.
        Write key_signals yourself: a list of 3-5 plain-English strings describing
        the most notable raw indicators (e.g. "RSI=68 near overbought").
        key_signals is the only field you derive yourself in this step.

      STEP 4 — Output EXACTLY this structure (pure Python dict, no markdown wrapper):
      {
        "sector": "$sector",
        "analysis_date": "$today",
        "stock_analyses": [
          {
            "ticker": "NVDA",
            "current_price": 875.50,
            "period_analyzed": "1y",
            "raw_indicators": {
              "rsi": 68.4,
              "macd_status": "Bullish",
              "ma_status": "Strong Uptrend",
              "bb_status": "Normal Range",
              "adx": 31.2,
              "atr": 22.5,
              "sma_20": 851.0,
              "ema_12": 860.0
            },
            "interpretation": {
              "overall_signal": "BULLISH",
              "key_signals": ["RSI=68 near overbought", "Strong uptrend SMA20>SMA50>SMA200", "MACD Bullish"],
              "entry_zone_low": 834.0,
              "entry_zone_high": 851.0,
              "momentum_score": 8,
              "risk_level": "MEDIUM"
            },
            "error": null
          }
        ],
        "sector_technical_summary": "2-3 paragraph summary of the overall technical picture for the sector."
      }

      RULES:
      - raw_indicators must use actual numbers from the tool — never invented values.
      - interpretation fields (entry_zone_low/high, momentum_score, risk_level, overall_signal)
        must be copied verbatim from the 'interpret_technical_indicators' tool result.
      - If the tool returns an error for a ticker, set error to that string and all other
        fields (current_price, raw_indicators, interpretation) to null.
      - Do not skip any ticker from the market analyst output.
    expected_output: >
      Python dict with sector='$sector', analysis_date,
      stock_analyses (one entry per ticker with raw_indicators and
      interpretation), and sector_technical_summary string.

  # ─────────────────────────────────────────────────────────────────────────────
  # Task 3: Fundamental Analysis
  # Agent:   Fundamental Analyst
  # Context: market_analysis_task, technical_analysis_task
  # Tools:   fetch_fundamental_data (FundamentalDataTool)
  # Output:  {sector, analysis_date, stock_analyses[n], sector_fundamental_summary}
  # ─────────────────────────────────────────────────────────────────────────────
  fundamental_analysis:
    description: |
      You are the Fundamental Analyst in the ProspectAI pipeline.
      You receive context from the Market Analyst (sentiment) and Technical Analyst (indicators).
      Fetch real financial data for each stock and produce a structured fundamental report.

      STEP 1 — Extract tickers:
        Read the technical analysis context. Find 'stock_analyses'. Extract each 'ticker'.

      STEP 2 — Call the tool for EACH ticker:
        Call 'fetch_fundamental_data' with ticker="<TICKER>".
        Collect all results. If a ticker returns an 'error' key, skip grading for that stock.

      STEP 3 — For each ticker, call 'grade_fundamental_data':
        Build a JSON string from the raw values returned in STEP 2 and call:
          grade_fundamental_data(
            ticker="<TICKER>",
            raw_fundamentals_json='{"pe_ratio":<val>,"ps_ratio":<val>,
              "current_ratio":<val>,"debt_to_equity":<val>,
              "free_cash_flow":<val>,"revenue_growth_yoy":<val>}'
          )
        Record the returned valuation_grade, financial_health, growth_outlook,
        and fundamental_component verbatim — do NOT recalculate them.
        Write risk_factors, catalysts, and fundamental_summary yourself,
        citing specific numbers from the raw data.
        These qualitative fields are the only things you derive yourself in this step.

      STEP 4 — Output EXACTLY this structure (pure Python dict, no markdown wrapper):
      {
        "sector": "$sector",
        "analysis_date": "$today",
        "stock_analyses": [
          {
            "ticker": "NVDA",
            "raw_fundamentals": {
              "pe_ratio": 65.2,
              "forward_pe": 38.1,
              "pb_ratio": 28.4,
              "ps_ratio": 30.1,
              "ev_ebitda": 55.3,
              "market_cap": 2150000000000,
              "revenue_growth_yoy": 0.122,
              "net_margin": 0.554,
              "gross_margin": 0.745,
              "return_on_equity": 1.234,
              "debt_to_equity": 0.41,
              "current_ratio": 4.17,
              "free_cash_flow": 26900000000,
              "dividend_yield": null
            },
            "assessment": {
              "valuation_grade": "VERY_EXPENSIVE",
              "financial_health": "STRONG",
              "growth_outlook": "MODERATE",
              "fundamental_component": 27,
              "fundamental_summary": "...",
              "risk_factors": ["PE ratio of 65x is historically elevated", "..."],
              "catalysts": ["Revenue growing at 12% YoY", "..."]
            },
            "error": null
          }
        ],
        "sector_fundamental_summary": "2-3 paragraph overview of sector-wide fundamental trends."
      }

      RULES:
      - raw_fundamentals must contain ONLY values from 'fetch_fundamental_data'. No invented numbers.
      - valuation_grade, financial_health, growth_outlook, fundamental_component must be copied
        verbatim from the 'grade_fundamental_data' tool result.
      - If either tool returns an error, set error to the string and assessment to null.
      - Include all tickers from technical analysis context.
    expected_output: >
      Python dict with sector='$sector', analysis_date,
      stock_analyses (one entry per ticker with raw_fundamentals and
      assessment), and sector_fundamental_summary string.

  # ─────────────────────────────────────────────────────────────────────────────
  # Task 4: Investment Strategy
  # Agent:   Investor Strategic
  # Context: market_analysis_task, technical_analysis_task, fundamental_analysis_task
  # Tools:   none (pure synthesis)
  # Output:  pipeline_version 2.0 structured JSON (machine-readable portfolio)
  # ─────────────────────────────────────────────────────────────────────────────
  investment_strategy:
    description: |
      You are the final agent in the ProspectAI pipeline.
      Synthesize the outputs from all three prior agents and produce a machine-readable
      JSON investment recommendation. This output is parsed programmatically —
      no markdown fences, no text before or after the JSON.

      STEP 1 — Cross-reference data for each ticker:
        From Market context:      average_sentiment (float)
        From Technical context:   momentum_score, entry_zone_low, entry_zone_high, risk_level
        From Fundamental context: financial_health, growth_outlook
        Also collect for qualitative writing: rationale, risk_factors, catalysts,
          overall_signal, valuation_grade, key_signals

      STEP 2 — Call 'build_portfolio' ONCE with ALL stocks combined:
        Build a JSON array with one entry per ticker and call:
          build_portfolio(stocks_json='[
            {
              "ticker": "<TICKER>",
              "average_sentiment": <float from Market context>,
              "momentum_score":    <float from Technical interpretation>,
              "financial_health":  "<STRONG|ADEQUATE|WEAK from Fundamental grader>",
              "growth_outlook":    "<HIGH|MODERATE|LOW|DECLINING from Fundamental grader>",
              "entry_zone_low":    <float from Technical interpretation>,
              "entry_zone_high":   <float from Technical interpretation>
            },
            ...
          ]')
        The tool returns for each stock: composite_score, action, allocation_pct,
        and trade_setup (with stop_loss and take_profit already computed).
        It also returns total_allocated_pct and cash_reserve_pct.
        Copy ALL numeric values verbatim — do NOT recalculate anything.

      STEP 3 — Determine risk_level from the Technical context:
        Count stocks whose risk_level is "HIGH".
        > 50% HIGH → "High"; > 50% LOW → "Low"; any HIGH present → "Medium"; else → "Low".

      STEP 4 — Write qualitative content for each position:
        rationale: 100-150 word synthesis per stock citing signals from all three agents.
        monitoring_triggers: 2-3 specific, measurable conditions to watch.
        review_frequency: "DAILY" for high-volatility, "WEEKLY" for most, "MONTHLY" for HOLD/AVOID.

      STEP 5 — Output EXACTLY this JSON structure:
      {
        "sector": "$sector",
        "positions": [
          {
            "ticker": "NVDA",
            "action": "LONG-BUY",
            "allocation_pct": 35.2,
            "trade_setup": {
              "direction": "LONG-BUY",
              "entry_zone_low": 834.0,
              "entry_zone_high": 851.0,
              "stop_loss": 809.0,
              "take_profit": 885.0
            },
            "rationale": "150-word synthesis citing specific signals from all three agents",
            "monitoring_triggers": ["RSI crosses below 45", "Earnings miss > 5 %"],
            "review_frequency": "WEEKLY"
          },
          {
            "ticker": "AAPL",
            "action": "HOLD",
            "allocation_pct": 0,
            "trade_setup": null,
            "rationale": "150-word synthesis ...",
            "monitoring_triggers": ["Price breaks below SMA50"],
            "review_frequency": "MONTHLY"
          }
        ],
        "total_allocated_pct": 35.2,
        "cash_reserve_pct": 64.8,
        "overall_strategy": "2-3 paragraph explanation of the portfolio construction logic, citing composite scores and key signals",
        "risk_level": "Medium"
      }

      RULES:
      - action, allocation_pct, trade_setup, total_allocated_pct, cash_reserve_pct,
        and composite_score MUST be copied verbatim from 'build_portfolio' tool output.
        Do NOT recompute any of these values.
      - risk_level must be one of: Low, Medium, High, Very High.
      - review_frequency must be one of: DAILY, WEEKLY, MONTHLY.
      - monitoring_triggers: list of 2-3 specific, measurable conditions.
      - All tickers from fundamental analysis must appear in positions.
      - Output only the JSON dict — no surrounding text, no markdown fences.
    expected_output: >
      JSON dict with sector='$sector', positions
      (ticker/action/allocation_pct/trade_setup/rationale/monitoring_triggers/
      review_frequency), total_allocated_pct, cash_reserve_pct,
      overall_strategy, and risk_level.
