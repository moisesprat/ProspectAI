# ProspectAI Task Configuration
# Primary place to change task behavior (instructions, output schema, expected_output).
# Use $sector and $today as template variables — they are substituted at runtime.
# Context wiring (which prior tasks each task receives) is defined in prospect_ai_crew.py.

tasks:

  # ─────────────────────────────────────────────────────────────────────────────
  # Task 1: Market Sentiment Analysis
  # Agent:   Market Analyst
  # Context: none (first in pipeline)
  # Tools:   analyze_sector_reddit_sentiment, search_internet (Serper fallback)
  # Output:  {sector, data_source, candidate_stocks[5], summary}
  # ─────────────────────────────────────────────────────────────────────────────
  market_analysis:
    description: |
      You are the first agent in the ProspectAI pipeline.
      Identify the top 5 most-discussed stocks in the $sector sector from Reddit retail
      investor communities and produce a structured sentiment report.

      STEP 1 — Call the Reddit tool:
        Call the tool named 'analyze_sector_reddit_sentiment' with sector="$sector".
        It returns a dict with 'candidate_stocks' (list) and 'fallback_required' (bool).

      STEP 2 — Handle fallback if needed:
        If fallback_required is True, use 'search_internet' (SerperDevTool) with query:
          "$sector sector stocks investors discussing $today"
        Extract up to 5 stock tickers from the search snippets. For each ticker, set:
          mention_count = 0, relevance_score = 0.5
          average_sentiment: assign a float in [-1.0, +1.0] based on the actual tone
            of the snippets for that ticker. Use the full range — do NOT default to 0.65.
            Examples: strongly bullish coverage → 0.75-0.85, mildly positive → 0.40-0.55,
            neutral/mixed → 0.10-0.30, mildly negative → -0.10 to -0.30,
            bearish/risk-focused → -0.40 to -0.70.
            Each ticker must get a DIFFERENT score reflecting its specific news tone.
        Set data_source to "serper_fallback".

      STEP 3 — Write LLM rationales (200-400 words each):
        For each stock, write a 'rationale' covering:
        a) Key themes retail investors are discussing right now
        b) Sentiment tone (bullish / bearish / mixed) and the specific reasons
        c) Catalysts or concerns mentioned (products, earnings, regulation, competition)
        d) Red flags or risks visible in community sentiment
        e) How current macroeconomic conditions, geopolitical events, or sector trends
           are influencing investor sentiment at this moment in time
        Today's date is $today. All analysis must reflect the current market environment.
        For Reddit data: base rationale on the 'sample_posts' field from the tool output.
        For Serper fallback: base rationale on the search result snippets.

      STEP 4 — Output EXACTLY this structure (pure Python dict, no markdown wrapper).
      Use the actual tickers identified in STEP 1 or STEP 2 — do NOT substitute example tickers:
      {
        "sector": "$sector",
        "data_source": "reddit",
        "candidate_stocks": [
          {
            "ticker": "<TICKER_FROM_STEP_1_OR_2>",
            "mention_count": <integer>,
            "average_sentiment": <float>,
            "relevance_score": <float>,
            "rationale": "<200-400 words>"
          }
        ],
        "summary": "<2-3 paragraph overview of overall sector sentiment as of $today, key themes, current macro/geopolitical context, and notable patterns — minimum 150 words>"
      }

      RULES:
      - Output exactly 5 stocks (fewer only if truly fewer were found).
      - Do NOT invent tickers. Use only tickers returned by the tool or found in search results.
      - All numeric values must be numbers, not strings.
      - The 'summary' must be at least 150 words.
    expected_output: >
      Python dict with sector='$sector', data_source,
      candidate_stocks (list of 5 dicts: ticker, mention_count,
      average_sentiment, relevance_score, rationale), and summary string.

  # ─────────────────────────────────────────────────────────────────────────────
  # Task 2: Technical Analysis
  # Agent:   Technical Analyst
  # Context: market_analysis_task
  # Tools:   calculate_technical_indicators (TechnicalAnalysisTool)
  # Output:  {sector, analysis_date, stock_analyses[n], sector_technical_summary}
  # ─────────────────────────────────────────────────────────────────────────────
  technical_analysis:
    description: |
      You are the Technical Analyst in the ProspectAI pipeline.
      You receive the Market Analyst output as context. Run technical analysis on every
      ticker in the candidate_stocks list and produce a structured report.

      STEP 1 — Extract tickers:
        Read the context. Find the 'candidate_stocks' list. Extract each 'ticker' value.
        You will typically get 5 tickers.

      STEP 2 — Call the tool for EACH ticker:
        Call 'calculate_technical_indicators' with ticker="<TICKER>" and period="1y".
        Collect all results before writing your output. If a ticker returns an 'error'
        key, record the error and continue to the next ticker.

      STEP 3 — For each ticker, call 'interpret_technical_indicators':
        Build a JSON string from the raw values returned in STEP 2 and call:
          interpret_technical_indicators(
            ticker="<TICKER>",
            raw_indicators_json='{"current_price":<val>,"sma_20":<val>,"sma_50":<val>,
              "sma_200":<val>,"atr":<val>,"rsi":<val>,"macd_status":"<val>",
              "ma_status":"<val>","bb_status":"<val>",
              "stochastic_status":"<val>","adx":<val>}'
          )
        Include sma_50, sma_200, and stochastic_status in the JSON — they are used
        for finer-grained momentum_score calculation.
        Record the returned entry_zone_low, entry_zone_high, momentum_score,
        and risk_level verbatim — these are computed numbers, not interpretations.

        Then use your own reasoning to produce:
        - overall_signal: your assessment of "BULLISH", "BEARISH", "MIXED", or "NEUTRAL"
          based on MACD status, MA status, RSI level, and other raw indicators.
        - key_signals: 3-5 plain-English strings describing the most notable readings

        For example:
          - "RSI at 63 — neutral momentum with room to appreciate before overbought"
          - "RSI at 71 — approaching overbought; watch for deceleration"
          - "MACD bullish crossover confirming uptrend continuation"
          - "Stochastic at 94 — extreme overbought, counter-trend bounce risk"
          - "Strong uptrend confirmed: SMA20 > SMA50 > SMA200"

      STEP 4 — Output EXACTLY this structure (pure Python dict, no markdown wrapper):
      {
        "sector": "$sector",
        "analysis_date": "$today",
        "stock_analyses": [
          {
            "ticker": "NVDA",
            "current_price": 875.50,
            "period_analyzed": "1y",
            "raw_indicators": {
              "rsi": 68.4,
              "macd_status": "Bullish",
              "ma_status": "Strong Uptrend",
              "bb_status": "Normal Range",
              "adx": 31.2,
              "atr": 22.5,
              "sma_20": 851.0,
              "ema_12": 860.0
            },
            "interpretation": {
              "overall_signal": "BULLISH",
              "key_signals": ["RSI=68 neutral with room to run", "Strong uptrend SMA20>SMA50>SMA200", "MACD Bullish"],
              "entry_zone_low": 834.0,
              "entry_zone_high": 851.0,
              "momentum_score": 8,
              "risk_level": "MEDIUM"
            },
            "error": null
          }
        ],
        "sector_technical_summary": "2-3 paragraph summary of the overall technical picture for the sector."
      }

      RULES:
      - raw_indicators must use actual numbers from the tool — never invented values.
      - entry_zone_low, entry_zone_high, momentum_score, risk_level must be copied
        verbatim from the 'interpret_technical_indicators' tool result.
      - overall_signal and key_signals are YOUR reasoned assessment of the raw data.
      - If the tool returns an error for a ticker, set error to that string and all other
        fields (current_price, raw_indicators, interpretation) to null.
      - Do not skip any ticker from the market analyst output.
    expected_output: >
      Python dict with sector='$sector', analysis_date,
      stock_analyses (one entry per ticker with raw_indicators and
      interpretation), and sector_technical_summary string.

  # ─────────────────────────────────────────────────────────────────────────────
  # Task 3: Fundamental Analysis
  # Agent:   Fundamental Analyst
  # Context: market_analysis_task, technical_analysis_task
  # Tools:   fetch_fundamental_data (FundamentalDataTool)
  # Output:  {sector, analysis_date, stock_analyses[n], sector_fundamental_summary}
  # ─────────────────────────────────────────────────────────────────────────────
  fundamental_analysis:
    description: |
      You are the Fundamental Analyst in the ProspectAI pipeline.
      You receive context from the Market Analyst (sentiment) and Technical Analyst (indicators).
      Fetch real financial data for each stock and produce a structured fundamental report.

      STEP 1 — Extract tickers:
        Read the technical analysis context. Find 'stock_analyses'. Extract each 'ticker'.

      STEP 2 — Call the tool for EACH ticker:
        Call 'fetch_fundamental_data' with ticker="<TICKER>".
        Collect all results. If a ticker returns an 'error' key, skip grading for that stock.

      STEP 3 — For each ticker, call 'grade_fundamental_data':
        Build a JSON string from the raw values returned in STEP 2 and call:
          grade_fundamental_data(
            ticker="<TICKER>",
            raw_fundamentals_json='{"pe_ratio":<val>,"ps_ratio":<val>,
              "current_ratio":<val>,"debt_to_equity":<val>,
              "free_cash_flow":<val>,"revenue_growth_yoy":<val>}'
          )
        Record the returned valuation_grade, financial_health, growth_outlook,
        and fundamental_component verbatim — do NOT recalculate them.
        Write risk_factors, catalysts, and fundamental_summary yourself,
        citing specific numbers from the raw data.
        These qualitative fields are the only things you derive yourself in this step.

      STEP 4 — Output EXACTLY this structure (pure Python dict, no markdown wrapper):
      {
        "sector": "$sector",
        "analysis_date": "$today",
        "stock_analyses": [
          {
            "ticker": "NVDA",
            "raw_fundamentals": {
              "pe_ratio": 65.2,
              "forward_pe": 38.1,
              "pb_ratio": 28.4,
              "ps_ratio": 30.1,
              "ev_ebitda": 55.3,
              "market_cap": 2150000000000,
              "revenue_growth_yoy": 0.122,
              "net_margin": 0.554,
              "gross_margin": 0.745,
              "return_on_equity": 1.234,
              "debt_to_equity": 0.41,
              "current_ratio": 4.17,
              "free_cash_flow": 26900000000,
              "dividend_yield": null
            },
            "assessment": {
              "valuation_grade": "VERY_EXPENSIVE",
              "financial_health": "STRONG",
              "growth_outlook": "MODERATE",
              "fundamental_component": 27,
              "fundamental_summary": "...",
              "risk_factors": ["PE ratio of 65x is historically elevated", "..."],
              "catalysts": ["Revenue growing at 12% YoY", "..."]
            },
            "error": null
          }
        ],
        "sector_fundamental_summary": "2-3 paragraph overview of sector-wide fundamental trends."
      }

      RULES:
      - raw_fundamentals must contain ONLY values from 'fetch_fundamental_data'. No invented numbers.
      - valuation_grade, financial_health, growth_outlook, fundamental_component must be copied
        verbatim from the 'grade_fundamental_data' tool result.
      - If either tool returns an error, set error to the string and assessment to null.
      - Include all tickers from technical analysis context.
    expected_output: >
      Python dict with sector='$sector', analysis_date,
      stock_analyses (one entry per ticker with raw_fundamentals and
      assessment), and sector_fundamental_summary string.

  # ─────────────────────────────────────────────────────────────────────────────
  # Task 4: Draft Strategy
  # Agent:   Investor Strategic
  # Context: market_analysis_task, technical_analysis_task, fundamental_analysis_task
  # Tools:   compute_composite_scores, allocate_portfolio
  # Output:  InvestorStrategicOutput (DRAFT — will be reviewed by Critic)
  # ─────────────────────────────────────────────────────────────────────────────
  draft_strategy:
    description: |
      You are the Draft Strategist in the ProspectAI pipeline.
      Synthesize the outputs from the Market, Technical, and Fundamental agents
      and produce a machine-readable JSON portfolio draft.
      NOTE: Your output will be reviewed by a Critic Agent who will challenge
      every position. Be rigorous — any claim you make must cite specific data.

      STEP 1 — Cross-reference data for each ticker:
        From Market context:      average_sentiment (float), rationale
        From Technical context:   momentum_score, entry_zone_low, entry_zone_high,
                                  entry_zone_status, regime, risk_level,
                                  overall_signal, key_signals, raw_indicators
        From Fundamental context: financial_health, growth_outlook, valuation_grade,
                                  fundamental_component, risk_factors, catalysts

        CRITICAL: average_sentiment is a float between -1.0 and 1.0. Extract the EXACT
        value — do NOT use 0.65 or any default.
        CRITICAL: momentum_score is a float between 0 and 10. Extract the EXACT
        value — do NOT default to 8.0 or any other fixed number.
        CRITICAL: Every stock must have a DISTINCT composite_score.

      STEP 2 — Call 'compute_composite_scores' ONCE with ALL stocks:
          compute_composite_scores(stocks_json='[
            {
              "ticker":            "<TICKER>",
              "average_sentiment": <float>,
              "momentum_score":    <float from Technical interpretation>,
              "financial_health":  "<STRONG|ADEQUATE|WEAK>",
              "growth_outlook":    "<HIGH|MODERATE|LOW|DECLINING>"
            }, ...
          ]')
        Record each stock's composite_score and components verbatim.

      STEP 3 — Decide the investment action for each stock:
        Choose one action per stock: LONG-BUY / SCALED-ENTRY / HOLD / WAIT-FOR-ENTRY / AVOID
        Apply these rules:
          - RSI > 70 or Stochastic > 80 → prefer WAIT-FOR-ENTRY
          - entry_zone_status = "PULLBACK_ENTRY" with gap ≥ 5% → WAIT-FOR-ENTRY
          - entry_zone_status = "PULLBACK_ENTRY" with gap < 5% + regime="TRENDING"
            + composite ≥ 75 + Stochastic < 88 → SCALED-ENTRY (half allocation, max 20%)
          - VERY_EXPENSIVE valuation → raise bar for LONG-BUY
          - financial_health = WEAK → acknowledge explicitly or avoid
          - Valid action values are exactly: LONG-BUY, SCALED-ENTRY, SHORT-SELL, HOLD,
            WAIT-FOR-ENTRY, AVOID. Any other string causes a Pydantic validation error
            that rejects the entire output. To express a staged or partial entry, use
            action=SCALED-ENTRY (not PARTIAL-ENTRY or any other invented label).
          - Trade setup R/R rule: if current_price > entry_zone_high (position is above
            its entry zone), you must choose ONE of the following — do not mix them:
            OPTION A: set action=WAIT-FOR-ENTRY, allocation_pct=0, trade_setup=null.
              Use this when you want to wait for price to reach the zone.
            OPTION B: set action=LONG-BUY and recalculate the trade setup using
              current_price as the entry reference:
                stop_loss must be below current_price (not below entry_zone_low)
                take_profit = current_price + 1.5 × (current_price - stop_loss) minimum
                R/R = (take_profit - current_price) / (current_price - stop_loss) >= 1.5
              Do NOT carry forward a zone-based trade setup when entering at current_price.
              The zone-based stop_loss/take_profit produce an invalid R/R at actual entry.

      STEP 4 — Call 'allocate_portfolio' ONCE with your decided actions:
          allocate_portfolio(stocks_json='[
            {
              "ticker":          "<TICKER>",
              "action":          "<YOUR DECIDED ACTION>",
              "composite_score": <float from Step 2>,
              "entry_zone_low":  <float from Technical context>,
              "entry_zone_high": <float from Technical context>
            }, ...
          ]')
        Record allocation_pct, trade_setup, total_allocated_pct, cash_reserve_pct verbatim.
        Maximum single position: 40%. SCALED-ENTRY positions cap at 20%.

      STEP 5 — Write qualitative content for each position:
        rationale: 100-150 words citing specific numbers from all three agents.
          Every claim must reference a data point (e.g. "RSI=67", "momentum_score=7.8").
        monitoring_triggers: 2-3 specific, measurable thresholds directionally
          consistent with your action. LONG-BUY triggers must fire on bearish
          reversal patterns, not normal uptrend levels.
        review_frequency: DAILY / WEEKLY / MONTHLY.

      STEP 6 — Determine portfolio risk_level: Low / Medium / High / Very High.

      STEP 7 — Output EXACTLY this JSON structure (no markdown fences):
      {
        "sector": "$sector",
        "positions": [
          {
            "ticker": "NVDA",
            "action": "LONG-BUY",
            "allocation_pct": 35.2,
            "current_price": 875.50,
            "trade_setup": {
              "direction": "LONG-BUY",
              "entry_zone_low": 834.0,
              "entry_zone_high": 851.0,
              "stop_loss": 809.0,
              "take_profit": 885.0
            },
            "rationale": "100-150 word synthesis citing specific data points",
            "monitoring_triggers": ["RSI crosses above 76", "Weekly close below SMA50"],
            "review_frequency": "WEEKLY"
          }
        ],
        "total_allocated_pct": 35.2,
        "cash_reserve_pct": 64.8,
        "overall_strategy": "2-3 paragraph explanation",
        "risk_level": "Medium"
      }
    expected_output: >
      JSON dict with sector='$sector', positions
      (ticker/action/allocation_pct/current_price/trade_setup/rationale/
      monitoring_triggers/review_frequency), total_allocated_pct, cash_reserve_pct,
      overall_strategy, and risk_level. This is a DRAFT pending Critic review.

  # ─────────────────────────────────────────────────────────────────────────────
  # Task 5: Critique Review
  # Agent:   Critic
  # Context: market + technical + fundamental + draft_strategy
  # Tools:   none (pure adversarial analysis)
  # Output:  CriticOutput
  # ─────────────────────────────────────────────────────────────────────────────
  critique_review:
    description: |
      You are the Critic Agent in the ProspectAI pipeline.
      You receive the Draft Portfolio plus all upstream data (Market, Technical,
      Fundamental). Your job is to challenge every position and find every flaw.

      STEP 1 — For EACH ticker in the draft, extract:
        From Technical context: RSI, Stochastic, MACD status, momentum_score,
          regime, entry_zone_status, entry_zone_low, entry_zone_high, ma_status.
        From Market context: average_sentiment, mention_count.
        From Fundamental context: valuation_grade, financial_health, growth_outlook.
        From Draft: action, allocation_pct, rationale, monitoring_triggers.

      STEP 2 — Apply the adversarial checklist to EACH ticker.
        You MUST find at least one issue per position.
        Flag every violation using these issue types:

        OVERBOUGHT_IGNORED       RSI > 70 or Stochastic > 80 and action is LONG-BUY
                                 with no explicit overbought acknowledgment in rationale.
        ENTRY_ZONE_VIOLATED      LONG-BUY with entry_zone_status="PULLBACK_ENTRY" and
                                 gap ≥ 5%, yet not using SCALED-ENTRY or WAIT-FOR-ENTRY.
        FABRICATED_SIGNAL        Rationale says "strong momentum" but momentum_score < 6,
                                 or says "bullish" but MACD is Bearish or Mixed.
        ALLOCATION_MISMATCH      Allocation rank does not match composite_score rank —
                                 a lower-scoring stock gets a higher allocation.
        SENTIMENT_CONTRADICTION  average_sentiment < 0.0 with action LONG-BUY and no
                                 negative-sentiment caveat in the rationale.
        VALUATION_IGNORED        valuation_grade is VERY_EXPENSIVE with LONG-BUY and
                                 no valuation risk mentioned in rationale.
        TRIGGER_CONTRADICTION    A monitoring trigger for LONG-BUY fires during a
                                 normal uptrend (e.g. RSI > 70 when uptrend is expected).
        CONCENTRATION_BREACH     allocation_pct > 40.0 for any single position.
        WEAK_FUNDAMENTALS_BUY    financial_health = WEAK with LONG-BUY and no
                                 acknowledgment of balance sheet risk.
        MISSING_STOP_LOGIC       stop_loss is set at or above entry_zone_high.
        VAGUE_RATIONALE          Rationale makes claims without citing specific numbers
                                 (no RSI value, no momentum_score, no specific metric).

        For each finding, state: the exact data value that creates the contradiction
        AND what the draft says about it. Do not describe issues vaguely.

      STEP 3 — Portfolio-level review:
        - Does total_allocated_pct + cash_reserve_pct = 100?
        - Does any position exceed 40% allocation?
        - Are there at least 3 distinct composite_scores?
        - Do all monitoring triggers reference specific measurable thresholds?
        - Is the overall_strategy internally consistent with the individual actions?

      STEP 4 — Write revision_directives as exact instructions:
        Format: "[TICKER]: [specific change required] because [exact data contradiction]"
        Example: "NVDA: Change action from LONG-BUY to WAIT-FOR-ENTRY because RSI=78
                  and Stochastic=82 indicate overbought conditions — neither value
                  appears in the rationale nor triggers."
        Every CRITICAL and MAJOR issue must have a corresponding directive.

      STEP 5 — Output EXACTLY this structure (pure Python dict, no markdown):
      {
        "sector": "$sector",
        "draft_assessment": "One paragraph summarizing the draft's key weaknesses.
          Do not praise. State what is wrong and why it matters for risk.",
        "per_ticker_critiques": [
          {
            "ticker": "NVDA",
            "severity": "CRITICAL",
            "issue_type": "OVERBOUGHT_IGNORED",
            "finding": "RSI=78 and Stochastic=82 but action is LONG-BUY. Neither
              value is mentioned in the 150-word rationale.",
            "instruction": "Change action to WAIT-FOR-ENTRY or add explicit RSI/
              Stochastic overbought acknowledgment and set RSI > 75 exit trigger."
          }
        ],
        "portfolio_level_issues": [
          "AAPL allocation (42%) exceeds the 40% single-position cap.",
          "Two positions have identical composite_score of 72.4 — input values
           were almost certainly defaulted rather than extracted from context."
        ],
        "revision_directives": [
          "NVDA: Change action to WAIT-FOR-ENTRY because RSI=78, Stochastic=82.",
          "AAPL: Reduce allocation from 42% to ≤40% to comply with cap rule."
        ],
        "approved_positions": []
      }

      RULES:
      - You MUST produce at least one critique per ticker.
      - Severity CRITICAL = requires mandatory action change or allocation change.
      - Severity MAJOR = requires rationale or trigger correction.
      - Severity MINOR = recommendation to improve clarity or precision.
      - approved_positions lists tickers where the draft is FULLY correct (can be empty).
      - Never soften a finding with "however" or "overall reasonable". Report the flaw.
    expected_output: >
      Python dict with sector='$sector', draft_assessment, per_ticker_critiques
      (list with ticker/severity/issue_type/finding/instruction), portfolio_level_issues,
      revision_directives, and approved_positions.

  # ─────────────────────────────────────────────────────────────────────────────
  # Task 6: Final Strategy
  # Agent:   Investor Strategic (revision pass)
  # Context: market + technical + fundamental + draft_strategy + critique_review
  # Tools:   compute_composite_scores, allocate_portfolio
  # Output:  InvestorStrategicOutput (FINAL — post-critic revision)
  # ─────────────────────────────────────────────────────────────────────────────
  final_strategy:
    description: |
      You are the Final Strategist in the ProspectAI pipeline.
      You receive your own draft (Task 4) and the Critic's review (Task 5),
      plus all original upstream data. Produce the revised final portfolio.

      STEP 1 — Read the Critic's revision_directives carefully.
        For EACH directive:
          - If you agree: implement the change and note it in the rationale.
          - If you disagree: cite the specific data point that contradicts the
            Critic's finding and explain why the original decision stands.
        You MUST address every CRITICAL and MAJOR critique.
        MINOR critiques may be accepted or defended with evidence.

      STEP 2 — Re-run tool calls only if actions changed.
        If a position action changes (e.g. LONG-BUY → WAIT-FOR-ENTRY):
          Call 'allocate_portfolio' again with the revised actions.
        If no actions changed: carry forward the draft's allocation_pct verbatim.
        You may call 'compute_composite_scores' again only if input values were wrong.

      STEP 3 — Write revised qualitative content:
        rationale: 100-150 words per position. If a critique was addressed, state
          what changed and why. If a critique was rejected, state which data supports
          the original decision. Every claim must cite a specific number.
        monitoring_triggers: must be directionally consistent with the action.
        review_frequency: DAILY / WEEKLY / MONTHLY.

      STEP 4 — Output the final portfolio in EXACTLY the same JSON structure as
        the draft_strategy. No mention of the critic process in the output —
        the output is the final portfolio only.

      {
        "sector": "$sector",
        "positions": [
          {
            "ticker": "NVDA",
            "action": "WAIT-FOR-ENTRY",
            "allocation_pct": 0,
            "current_price": 875.50,
            "trade_setup": null,
            "rationale": "Revised from draft LONG-BUY: RSI=78 and Stochastic=82
              confirm overbought conditions as flagged. Waiting for RSI to drop
              below 65 before initiating. momentum_score=8.1 remains strong.",
            "monitoring_triggers": ["RSI drops below 65", "Price retraces to SMA20"],
            "review_frequency": "WEEKLY"
          }
        ],
        "total_allocated_pct": 0,
        "cash_reserve_pct": 100,
        "overall_strategy": "2-3 paragraph explanation of final portfolio construction",
        "risk_level": "Low"
      }

      RULES:
      - Output only the JSON dict — no text before or after, no markdown fences.
      - All CRITICAL critique issues must be addressed (changed or defended).
      - allocation_pct, trade_setup, total_allocated_pct, cash_reserve_pct from
        allocate_portfolio must be copied verbatim — never hand-calculated.
      - risk_level: Low / Medium / High / Very High.
      - review_frequency: DAILY / WEEKLY / MONTHLY.
      - Maximum single-position size: 40%.
    expected_output: >
      JSON dict with sector='$sector', positions
      (ticker/action/allocation_pct/current_price/trade_setup/rationale/
      monitoring_triggers/review_frequency), total_allocated_pct, cash_reserve_pct,
      overall_strategy, and risk_level. This is the FINAL revised portfolio.